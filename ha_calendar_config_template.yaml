# ============================================================
#  Home Assistant configuration template for ESPHome e-ink calendar
#  Copy the relevant sections into your configuration.yaml
#  (or split into packages / separate files as preferred)
#
#  Placeholders to replace:
#    YOUR_DEVICE_NAME     - ESPHome device name, e.g. "calendarclaude"
#    YOUR_CALENDAR_*      - HA calendar entity IDs to include
# ============================================================

# ------------------------------------------------------------
#  Template sensors and binary sensors
# ------------------------------------------------------------
template:

  # Binary sensor: true when calendar data has been updated since
  # the display last refreshed. The ESPHome firmware uses this to
  # decide whether to redraw the screen on timer wakeup.
  - binary_sensor:
      - name: "YOUR_DEVICE_NAME Calendar Data Update During Deep Sleep"
        unique_id: your_device_name_calendar_data_update_during_deep_sleep
        state: >
          {% set calendar_last_updated = states.sensor.your_device_name_calendar_data.last_updated %}
          {% set display_last_updated  = states.sensor.your_device_name_last_display_update.last_updated %}
          {{ calendar_last_updated and display_last_updated and (calendar_last_updated > display_last_updated) }}

  # Trigger-based sensor: refreshed every minute.
  # Fetches raw calendar events, converts them via pyscript,
  # then exposes all attributes the ESPHome firmware expects.
  - trigger:
      - platform: time_pattern
        minutes: "/1"
    action:
      # --- Fetch events from all relevant calendars ---
      - service: calendar.get_events
        data:
          duration:
            days: 180   # How far into the future to fetch
        target:
          entity_id:
            - calendar.YOUR_CALENDAR_1   # Replace with your calendar entity IDs
            # - calendar.YOUR_CALENDAR_2
        response_variable: calendar_response

      # --- Convert to ESPHome-compatible JSON via pyscript ---
      - service: pyscript.your_device_name_calendar_data_conversion
        data:
          calendar: "{{ calendar_response }}"
          now: "{{ now().date() }}"

    sensor:
      - name: "YOUR_DEVICE_NAME Calendar Data"
        unique_id: your_device_name_calendar_data
        state: "{{ now().isoformat() }}"
        attributes:
          todays_day_name: >
            {{ ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'][now().weekday()] }}
          todays_date_month_year: >
            {% set months = ["January","February","March","April","May","June",
                             "July","August","September","October","November","December"] %}
            {{ months[now().month - 1] }} {{ now().strftime('%Y') }}
          closest_end_time: "{{ state_attr('sensor.your_device_name_calendar_data', 'closest_end_time') }}"
          entries:         "{{ state_attr('sensor.your_device_name_calendar_data', 'entries') }}"
